<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egor Lvov</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 36px;
      margin-bottom: 20px;
    }

    .photo-wrap {
      flex-shrink: 0;
    }

    .photo-wrap img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder shown when no photo is set */
    .photo-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.4;
    }

    .header-text h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .header-text .tagline {
      font-size: 1rem;
      color: #555;
      margin-bottom: 14px;
    }

    /* ── Contact buttons ── */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .contact-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 13.5px;
      color: #1a1a1a;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .contact-links a:hover {
      background: #f2f2f2;
      border-color: #999;
    }

    .contact-links a svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 32px 0;
    }

    /* ── About blurb ── */
    .about {
      color: #333;
      font-size: 15.5px;
    }
  </style>
</head>
